<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Course in IDE</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Open Toolbox Course Link</h1>

        <form id="courseForm">
            <div class="form-group">
                <label for="marketplaceId">Marketplace ID:</label>
                <input
                    type="number"
                    id="marketplaceId"
                    name="marketplaceId"
                    placeholder="Enter course marketplace ID"
                    value="16630"
                    required
                >
            </div>

            <div class="form-group">
                <label for="programmingLanguage">Programming Language:</label>
                <select id="programmingLanguage" name="programmingLanguage" required>
                    <option value="Python" selected>Python</option>
                    <option value="Kotlin">Kotlin</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Java">Java</option>
                    <option value="Go">Go</option>
                    <option value="Scala">Scala</option>
                    <option value="Objective-C">Objective-C</option>
                    <option value="Rust">Rust</option>
                    <option value="C++">C++</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="studyItemId">Task ID (optional):</label>
                <input
                    type="text"
                    id="studyItemId"
                    name="studyItemId"
                    placeholder="Task ID from course structure API"
                >
                <small class="input-hint">Leave empty to open the course from the beginning. Use task ID from /api/plugin/course-structure</small>
            </div>

            <button type="submit" class="btn-generate">Open in IDE</button>
        </form>

    </div>

    <!-- Toast notification for progressive disclosure -->
    <div id="toast" class="toast hidden">
        <button class="toast-close hidden" id="toastClose" aria-label="Close">&times;</button>

        <div id="toastLoading">
            <p class="toast-text">Opening course...</p>
        </div>

        <div id="toastQuestion" class="hidden">
            <p class="toast-text">Did the course open?</p>
            <div class="toast-buttons">
                <button id="toastYesBtn" class="btn-toast">Yes</button>
                <button id="toastNoBtn" class="btn-toast btn-toast-secondary">No</button>
            </div>
        </div>

        <div id="toastHelp" class="hidden">
            <p class="toast-title">Install JetBrains Toolbox</p>
            <p class="toast-text">To open courses in your IDE, you need Toolbox App</p>
            <a href="https://www.jetbrains.com/toolbox-app/" target="_blank" class="toolbox-link-small">
                Download JetBrains Toolbox
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
